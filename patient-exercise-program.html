  // ── Page state ──
  let currentPatientId = null;
  let currentPatient = null;
  let currentExercises = [];

  // ── Initialize exercises (seed from pathology on first visit) ──
  function initializePatientExercises(patientId, patient) {
    const existing = getPatientExercises(patientId);
    if (existing !== null) {
      return existing;
    }

    let exercises = [];
    if (patient.pathology) {
      const pathologyLower = patient.pathology.toLowerCase().trim();
      const matchedPathology = getPathologyList().find(p =>
        p.name.toLowerCase() === pathologyLower
      );

      if (matchedPathology) {
        const assignments = getAssignments();
        const assigned = assignments[matchedPathology.id];
        if (assigned && assigned.length > 0) {
          exercises = [...assigned];
        }
      }
    }

    savePatientExercises(patientId, exercises);
    return exercises;
  }

  // ── Render exercise list ──
  // ── Render instruction text with inline editable params ──
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderParamWheel(defaultValue, currentValue, exerciseName, paramIndex) {
    const safeEx = exerciseName.replace(/"/g, '&quot;');
    // Split value into number and non-number parts
    const defaultParts = defaultValue.split(/(\d+)/);
    const currentParts = currentValue.split(/(\d+)/);

    let html = `<span class="param-wheel" data-exercise="${safeEx}" data-index="${paramIndex}" data-default="${escapeHtml(defaultValue)}">`;
    let numIdx = 0;
    for (let i = 0; i < defaultParts.length; i++) {
      if (/^\d+$/.test(defaultParts[i])) {
        const num = (currentParts[i] && /^\d+$/.test(currentParts[i])) ? currentParts[i] : defaultParts[i];
        html += `<span class="param-number" data-num-index="${numIdx}">${num}</span>`;
        numIdx++;
      } else {
        html += escapeHtml(defaultParts[i]);
      }
    }
    html += '</span>';
    return html;
  }

  // ── Value picker popup ──
  function getPresetsForUnit(unitText) {
    const u = (unitText || '').trim().toLowerCase();
    if (/seconds?/.test(u))                          return [5, 10, 15, 20, 30, 45, 60, 90, 120];
    if (/times|repetitions?|reps?/.test(u))          return [5, 10, 15, 20, 25, 30, 40, 50];
    if (/centimetres?|cm/.test(u))                   return [5, 10, 15, 20, 30, 45, 60];
    if (/degrees?/.test(u))                          return [15, 30, 45, 60, 90, 120, 180];
    if (/minutes?/.test(u))                          return [1, 2, 3, 5, 10, 15, 20, 30];
    return [5, 10, 15, 20, 25, 30, 35, 40, 45, 50];
  }

  let _activePickerNumEl = null;

  function closeParamPicker() {
    const old = document.querySelector('.param-picker');
    const oldBd = document.querySelector('.param-picker-backdrop');
    if (old) old.remove();
    if (oldBd) oldBd.remove();
    _activePickerNumEl = null;
  }

  function applyPickerValue(value) {
    if (!_activePickerNumEl) return;
    const num = parseInt(value, 10);
    if (isNaN(num) || num < 0) return;

    _activePickerNumEl.textContent = num;

    // Reconstruct and save (same logic as scroll handler)
    const wheel = _activePickerNumEl.closest('.param-wheel');
    if (!wheel) return;
    const defaultVal = wheel.dataset.default;
    const defaultParts = defaultVal.split(/(\d+)/);
    const allNums = wheel.querySelectorAll('.param-number');
    let reconstructed = '';
    let numI = 0;
    for (const part of defaultParts) {
      if (/^\d+$/.test(part)) {
        reconstructed += allNums[numI] ? allNums[numI].textContent : part;
        numI++;
      } else {
        reconstructed += part;
      }
    }
    savePatientParam(currentPatientId, wheel.dataset.exercise, wheel.dataset.index, reconstructed);
    closeParamPicker();
  }

  function openParamPicker(numEl) {
    closeParamPicker();
    _activePickerNumEl = numEl;

    const wheel = numEl.closest('.param-wheel');
    if (!wheel) return;

    // Extract unit from default value (text after last number)
    const defaultVal = wheel.dataset.default || '';
    const unitMatch = defaultVal.match(/\d+\s*(.+)$/);
    const unit = unitMatch ? unitMatch[1] : '';
    const presets = getPresetsForUnit(unit);
    const currentVal = parseInt(numEl.textContent, 10);

    // Build popup HTML
    const presetsHtml = presets.map(p =>
      `<button class="param-picker-preset${p === currentVal ? ' active' : ''}" data-val="${p}">${p}</button>`
    ).join('');

    const pickerHtml = `
      <div class="param-picker-presets">${presetsHtml}</div>
      <div class="param-picker-custom">
        <label>Custom:</label>
        <input type="number" class="param-picker-input" min="0" value="${currentVal}" inputmode="numeric">
        <button class="param-picker-ok">OK</button>
      </div>`;

    // Backdrop
    const backdrop = document.createElement('div');
    backdrop.className = 'param-picker-backdrop';
    backdrop.addEventListener('click', closeParamPicker);
    document.body.appendChild(backdrop);

    // Popup
    const picker = document.createElement('div');
    picker.className = 'param-picker';
    picker.innerHTML = pickerHtml;
    document.body.appendChild(picker);

    // Position below the param-wheel
    const rect = wheel.getBoundingClientRect();
    let top = rect.bottom + 6;
    let left = rect.left;

    // Keep within viewport
    const pickerRect = picker.getBoundingClientRect();
    if (top + pickerRect.height > window.innerHeight - 10) {
      top = rect.top - pickerRect.height - 6;
    }
    if (left + pickerRect.width > window.innerWidth - 10) {
      left = window.innerWidth - pickerRect.width - 10;
    }
    picker.style.top = top + 'px';
    picker.style.left = Math.max(10, left) + 'px';

    // Preset click handlers
    picker.querySelectorAll('.param-picker-preset').forEach(btn => {
      btn.addEventListener('click', () => applyPickerValue(btn.dataset.val));
    });

    // Custom input handlers
    const input = picker.querySelector('.param-picker-input');
    const okBtn = picker.querySelector('.param-picker-ok');
    okBtn.addEventListener('click', () => applyPickerValue(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyPickerValue(input.value);
      if (e.key === 'Escape') closeParamPicker();
    });
    input.focus();
    input.select();
  }

  function renderInstructionWithParams(exerciseName) {
    const template = INSTRUCTION_TEMPLATES[exerciseName];
    if (!template) return null;

    const patientParams = getPatientParams(currentPatientId);
    const overrides = (patientParams[exerciseName]) || {};

    const regex = /\{\{(.+?)\}\}/g;
    let result = '';
    let lastIndex = 0;
    let paramIndex = 0;
    let match;

    while ((match = regex.exec(template)) !== null) {
      const textBefore = template.slice(lastIndex, match.index);
      result += escapeHtml(textBefore).replace(/\n/g, '<br>');

      const defaultValue = match[1];
      const currentValue = overrides[String(paramIndex)] || defaultValue;
      result += renderParamWheel(defaultValue, currentValue, exerciseName, paramIndex);

      lastIndex = match.index + match[0].length;
      paramIndex++;
    }

    if (lastIndex < template.length) {
      result += escapeHtml(template.slice(lastIndex)).replace(/\n/g, '<br>');
    }

    return result;
  }

  function renderPatientProgram() {
    const instructions = getInstructions();
    const container = document.getElementById('exercise-list');
    document.getElementById('exercise-count').textContent = currentExercises.length;

    if (currentExercises.length === 0) {
      container.innerHTML = `
        <div class="text-center py-12">
          <div class="text-4xl mb-4">&#x1F3CB;&#xFE0F;</div>
          <div class="font-semibold text-navy mb-1">No exercises assigned</div>
          <div class="text-slate-400 text-sm">Use the dropdown above to add exercises to this patient's program.</div>
        </div>`;
      updateAddDropdown();
      return;
    }

    container.innerHTML = currentExercises.map(ex => {
      const instruction = instructions[ex] || '';
      const safeEx = ex.replace(/'/g, "\\'");

      // Try to render with editable params; fall back to plain text
      const paramHtml = renderInstructionWithParams(ex);
      let instructionHtml;
      if (paramHtml) {
        instructionHtml = paramHtml;
      } else if (instruction) {
        instructionHtml = `<span class="whitespace-pre-line">${instruction}</span>`;
      } else {
        instructionHtml = '<span class="text-slate-400 italic">No instructions written yet. Add them in the Exercise Library.</span>';
      }

      return `
        <div class="exercise-card border border-slate-100 rounded-xl mb-3 overflow-hidden">
          <div class="flex items-center justify-between p-4">
            <button onclick="toggleExerciseExpand(this)"
                    class="flex-1 text-left flex items-center gap-3
                           focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-300 rounded-lg"
                    style="transition:background 0.15s">
              <div class="w-2 h-2 rounded-full flex-shrink-0"
                   style="background:${instruction ? '#0a8f8f' : '#dce5ee'}"></div>
              <span class="text-sm font-semibold text-navy tracking-snug">${ex}</span>
              <svg class="expand-chevron w-4 h-4 text-slate-400 flex-shrink-0 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <button onclick="removeExerciseFromPatient('${safeEx}')"
                    class="ml-3 w-7 h-7 rounded-lg flex items-center justify-center text-slate-400
                           hover:bg-red-50 hover:text-red-500
                           focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-300
                           flex-shrink-0 text-xs"
                    style="transition:background 0.15s,color 0.15s"
                    title="Remove ${ex}">&#x2715;</button>
          </div>
          <div class="exercise-expand-body" style="max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.22,1,0.36,1)">
            <div class="px-4 pb-4">
              <div class="bg-slate-50 rounded-xl p-4">
                <div class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Instructions</div>
                <div class="text-sm text-navy leading-relaxed">${instructionHtml}</div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');

    updateAddDropdown();
  }

  // ── Expand / collapse exercise ──
  function toggleExerciseExpand(btn) {
    const item = btn.closest('.exercise-card');
    const body = item.querySelector('.exercise-expand-body');
    const chevron = btn.querySelector('.expand-chevron');

    if (body.style.maxHeight && body.style.maxHeight !== '0px') {
      body.style.maxHeight = '0px';
      chevron.style.transform = '';
    } else {
      body.style.maxHeight = body.scrollHeight + 'px';
      chevron.style.transform = 'rotate(180deg)';
    }
  }

  // ── Update add dropdown ──
  function updateAddDropdown() {
    const masterList = getMasterExerciseList();
    const available = masterList.filter(ex => !currentExercises.includes(ex));
    const btn = document.getElementById('add-exercise-btn');

    if (available.length === 0) {
      createSearchSelect('search-select-add', [], 'All exercises assigned');
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      btn.disabled = true;
    } else {
      createSearchSelect('search-select-add', available, 'Search exercises to add...');
      btn.classList.remove('opacity-50', 'cursor-not-allowed');
      btn.disabled = false;
    }
    createPathologySearchSelect('search-select-pathology');
  }

  // ── Add / Remove ──
  function addExerciseToPatient() {
    const exercise = getSearchSelectValue('search-select-add');
    if (!exercise) return;

    if (!currentExercises.includes(exercise)) {
      currentExercises.push(exercise);
      savePatientExercises(currentPatientId, currentExercises);
    }
    renderPatientProgram();
  }

  function addPathologyExercises() {
    const pathologyId = getSearchSelectValue('search-select-pathology');
    if (!pathologyId) return;

    const assignments = getAssignments();
    const pathologyExercises = assignments[pathologyId] || [];
    if (pathologyExercises.length === 0) return;

    const pathology = getPathologyList().find(p => p.id === pathologyId);
    const pathologyName = pathology ? pathology.name : pathologyId;

    const newExercises = pathologyExercises.filter(ex => !currentExercises.includes(ex));
    const skippedCount = pathologyExercises.length - newExercises.length;

    newExercises.forEach(ex => currentExercises.push(ex));
    if (newExercises.length > 0) {
      savePatientExercises(currentPatientId, currentExercises);
    }

    // Show feedback
    const feedbackEl = document.getElementById('pathology-add-feedback');
    let msg = '';
    if (newExercises.length > 0 && skippedCount === 0) {
      msg = `Added ${newExercises.length} exercise${newExercises.length !== 1 ? 's' : ''} from "${pathologyName}"`;
    } else if (newExercises.length > 0 && skippedCount > 0) {
      msg = `Added ${newExercises.length} exercise${newExercises.length !== 1 ? 's' : ''} from "${pathologyName}" (${skippedCount} already assigned)`;
    } else {
      msg = `All exercises from "${pathologyName}" are already assigned`;
    }
    feedbackEl.textContent = msg;
    feedbackEl.classList.remove('hidden');
    setTimeout(() => feedbackEl.classList.add('hidden'), 4000);

    // Clear pathology select
    const container = document.getElementById('search-select-pathology');
    if (container) {
      container._selectedValue = '';
      const input = document.getElementById('search-select-pathology-input');
      if (input) input.value = '';
    }

    renderPatientProgram();
  }

  function removeExerciseFromPatient(exerciseName) {
    currentExercises = currentExercises.filter(ex => ex !== exerciseName);
    savePatientExercises(currentPatientId, currentExercises);
    renderPatientProgram();
  }

  // ── Profile Popup ──
  function toggleProfilePopup(e) {
    e.stopPropagation();
    document.getElementById('profile-popup').classList.toggle('open');
  }
  function closeProfilePopup() {
    document.getElementById('profile-popup').classList.remove('open');
  }
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('profile-popup');
    const trigger = document.getElementById('profile-trigger');
    if (popup && !popup.contains(e.target) && !trigger.contains(e.target)) closeProfilePopup();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeProfilePopup(); });

  // ── Logout ──
  function handleLogout() {
    localStorage.removeItem('pap_user');
    window.location.href = 'login.html';
  }

  // ── Init ──
  function initPage() {
    if (user) {
      document.getElementById('user-initial').textContent = user.username.charAt(0).toUpperCase();
      document.getElementById('user-greeting').textContent = 'Welcome, ' + user.username;
      document.getElementById('popup-user-initial').textContent = user.username.charAt(0).toUpperCase();
      document.getElementById('popup-user-name').textContent = user.username;
    }

    const params = new URLSearchParams(window.location.search);
    currentPatientId = params.get('id');

    if (!currentPatientId) {
      document.getElementById('page-title').textContent = 'Patient Not Found';
      document.getElementById('page-subtitle').textContent = 'No patient ID provided.';
      return;
    }

    const patients = getPatients();
    currentPatient = patients.find(p => p.id === currentPatientId);

    if (!currentPatient) {
      document.getElementById('page-title').textContent = 'Patient Not Found';
      document.getElementById('page-subtitle').textContent = 'Could not find a patient with that ID.';
      return;
    }

    document.getElementById('page-title').textContent = 'Exercise Program for ' + currentPatient.name;
    document.getElementById('page-subtitle').textContent = currentPatient.pathology || 'No pathology assigned';

    currentExercises = initializePatientExercises(currentPatientId, currentPatient);
    renderPatientProgram();

    // Click/tap handler — opens value picker popup (same target area as scroll)
    document.getElementById('exercise-list').addEventListener('click', (e) => {
      const wheel = e.target.closest('.param-wheel');
      if (!wheel) return;
      let numEl = e.target.closest('.param-number');
      if (!numEl) {
        const allNums = wheel.querySelectorAll('.param-number');
        if (allNums.length === 1) numEl = allNums[0];
        else if (allNums.length > 1) numEl = allNums[allNums.length - 1];
      }
      if (!numEl) return;
      openParamPicker(numEl);
    });

    /* let lastWheelTime = 0;

  }

  initPage();
</script>
